name: Test Builds

on:
  push:
    paths:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'
    - '.goreleaser.yaml'
    - 'Dockerfile'
    - '.github/workflows/test-builds.yaml'
    branches:
    - main
  pull_request:
    paths:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'
    - '.goreleaser.yaml'
    - 'Dockerfile'
    - '.github/workflows/test-builds.yaml'
  workflow_dispatch:
  workflow_call:

jobs:

  test-shared-lib-builds:
    name: Test Build Shared Lib - ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet \
                    /usr/local/lib/android \
                    /opt/ghc \
                    /opt/hostedtoolcache/CodeQL \
                    /usr/local/share/boost \
                    "$AGENT_TOOLSDIRECTORY"
        sudo docker image prune --all --force >/dev/null
        df -h /
    - name: Checkout
      uses: actions/checkout@v6
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Download llvm-mingw latest version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ASSET_NAME=$(gh release view --repo mstorsjo/llvm-mingw --json assets -q '.assets[].name | select(test("ucrt-ubuntu.*x86_64\\.tar\\.xz$"))')
        gh release download --repo mstorsjo/llvm-mingw --pattern "$ASSET_NAME" --dir "$RUNNER_TEMP"
        mkdir -p "$RUNNER_TEMP/llvm-mingw"
        tar -xf "$RUNNER_TEMP/$ASSET_NAME" --strip-components=1 -C "$RUNNER_TEMP/llvm-mingw"
    - name: Testing SLV Shared Lib Build - ${{ matrix.goos }}/${{ matrix.goarch }}
      run: |
        docker run --rm \
        -w /workspace \
        -v $PWD:/workspace \
        -v $RUNNER_TEMP/llvm-mingw:/llvm-mingw \
        ghcr.io/goreleaser/goreleaser-cross:latest \
        build --clean --snapshot --id slv-shared-lib-${{ matrix.goos }}-${{ matrix.goarch }}

  test-app-builds:
    name: Test Build App Binary - ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
    - name: Build SLV App - ${{ matrix.goos }}/${{ matrix.goarch }}
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: "0"
      run: |
        set -euo pipefail
        ext=""
        if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
        out="dist/slv_${GOOS}_${GOARCH}/slv${ext}"
        mkdir -p "$(dirname "$out")"
        commit_date="$(git log -1 --format=%cI)"
        go build \
          -trimpath \
          -mod=readonly \
          -ldflags="-s -w \
            -X slv.sh/slv/internal/core/config.version=0-dev-${GITHUB_SHA::7} \
            -X slv.sh/slv/internal/core/config.commitDate=${commit_date} \
            -X slv.sh/slv/internal/core/config.fullCommit=${GITHUB_SHA} \
            -X slv.sh/slv/internal/core/config.releaseURL=" \
          -o "$out" \
          ./internal/app
        ls -lh "$out"
        file "$out" || true
    - name: Upload artifact - ${{ matrix.goos }}/${{ matrix.goarch }}
      uses: actions/upload-artifact@v7
      with:
        name: slv-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/slv_${{ matrix.goos }}_${{ matrix.goarch }}/*
        if-no-files-found: error
        retention-days: 7

  test-image-builds:
    name: Test Build Image
    runs-on: ubuntu-latest
    needs: test-app-builds
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download linux/amd64 binary
      uses: actions/download-artifact@v6
      with:
        name: slv-linux-amd64
        path: dist/slv_linux_amd64_v1
    - name: Download linux/arm64 binary
      uses: actions/download-artifact@v6
      with:
        name: slv-linux-arm64
        path: dist/slv_linux_arm64_v8.0
    - name: Ensure binaries are executable
      run: |
        chmod +x dist/slv_linux_amd64_v1/slv dist/slv_linux_arm64_v8.0/slv
        ls -lh dist/slv_linux_amd64_v1/slv dist/slv_linux_arm64_v8.0/slv
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build multi-arch image (no push)
      uses: docker/build-push-action@v7
      with:
        platforms: linux/amd64,linux/arm64
        context: .
        push: false
        tags: slv:test
    - name: Load linux/amd64 image for runtime test
      uses: docker/build-push-action@v7
      with:
        platforms: linux/amd64
        context: .
        load: true
        tags: slv:test-amd64
    - name: Run slv version (linux/amd64)
      run: docker run --rm --platform linux/amd64 slv:test-amd64 version
    - name: Load linux/arm64 image for runtime test
      uses: docker/build-push-action@v7
      with:
        platforms: linux/arm64
        context: .
        load: true
        tags: slv:test-arm64
    - name: Run slv version (linux/arm64)
      run: docker run --rm --platform linux/arm64 slv:test-arm64 version
