version: 2

project_name: slv

env:
  - GO111MODULE=on
  - CGO_ENABLED=1

before:
  hooks:
    - sh -c '{ command -v apt-get >/dev/null 2>&1 && HOST_ARCH=$(dpkg --print-architecture) && for a in amd64 arm64 armhf; do [ "$a" = "$HOST_ARCH" ] || dpkg --add-architecture "$a"; done && apt-get update && apt-get install -y --no-install-recommends libx11-dev:amd64 libx11-dev:arm64 libx11-dev:armhf; } || true'

builds:

# Builds for SLV App
  - id: slv-app-darwin-amd64
    binary: slv
    main: ./internal/app
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CC=o64-clang
      - CXX=o64-clang++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}

  - id: slv-app-darwin-arm64
    binary: slv
    main: ./internal/app
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CC=oa64-clang
      - CXX=oa64-clang++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}

  - id: slv-app-windows-amd64
    binary: slv
    main: ./internal/app
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}

  - id: slv-app-windows-arm64
    binary: slv
    main: ./internal/app
    goos:
      - windows
    goarch:
      - arm64
    env:
      - CC=/llvm-mingw/bin/aarch64-w64-mingw32-gcc
      - CXX=/llvm-mingw/bin/aarch64-w64-mingw32-g++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}

  - id: slv-app-linux-amd64
    binary: slv
    main: ./internal/app
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}
      - -extldflags "-lc -lrt -lpthread"

  - id: slv-app-linux-arm64
    binary: slv
    main: ./internal/app
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}
      - -extldflags "-lc -lrt -lpthread"

  - id: slv-app-linux-armv7
    binary: slv
    main: ./internal/app
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - "7"
    env:
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}
      - -extldflags "-lc -lrt -lpthread"

# Builds for Shared Library
  - id: slv-shared-lib-darwin-amd64
    binary: slv
    main: ./internal/sharedlib
    buildmode: c-shared
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CC=o64-clang
      - CXX=o64-clang++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}

  - id: slv-shared-lib-darwin-arm64
    binary: slv
    main: ./internal/sharedlib
    buildmode: c-shared
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CC=oa64-clang
      - CXX=oa64-clang++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}

  - id: slv-shared-lib-windows-amd64
