    env:
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s
      - -w
      - -X slv.sh/slv/internal/core/config.version={{.Version}}
      - -X slv.sh/slv/internal/core/config.commitDate={{.CommitDate}}
      - -X slv.sh/slv/internal/core/config.fullCommit={{.FullCommit}}
      - -X slv.sh/slv/internal/core/config.releaseURL={{.ReleaseURL}}
      - -extldflags "-lc -lrt -lpthread"

archives:
  - id: slv
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [ 'zip' ]
    ids:
      - slv-app-darwin-amd64
      - slv-app-darwin-arm64
      - slv-app-windows-amd64
      - slv-app-windows-arm64
      - slv-app-linux-amd64
      - slv-app-linux-arm64
      - slv-app-linux-armv7
  - id: slv-shared-lib
    name_template: "{{ .ProjectName }}-shared-lib_{{ .Os }}_{{ .Arch }}"
    formats: [ 'zip' ]
    ids:
      - slv-shared-lib-darwin-amd64
      - slv-shared-lib-darwin-arm64
      - slv-shared-lib-windows-amd64
      - slv-shared-lib-windows-arm64
      - slv-shared-lib-linux-amd64
      - slv-shared-lib-linux-arm64
      - slv-shared-lib-linux-armv7

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - ids:
      - slv-app-linux-amd64
      - slv-app-linux-arm64
      - slv-app-linux-armv7
    file_name_template: '{{ .PackageName }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    vendor: SLV
    homepage: https://slv.sh
    maintainer: Shibly Meeran <shibme@shib.me>
    formats:
      - apk
      - deb
      - rpm

homebrew_casks:
  - ids:
      - slv
    name: slv
    binaries:
      - slv
    homepage: https://slv.sh
    description: "SLV (Secure Local Vault) - Securely store, share, and access secrets alongside your codebase with modern encryption techniques."
    license: "MIT"
    url:
      verified: "github.com/amagioss/slv/"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/slv"]
          end
          system_command "/bin/mkdir", args: ["-p", "#{HOMEBREW_PREFIX}/etc/bash_completion.d"]
          system_command "/bin/mkdir", args: ["-p", "#{HOMEBREW_PREFIX}/share/zsh/site-functions"]
          system_command "/bin/mkdir", args: ["-p", "#{HOMEBREW_PREFIX}/share/fish/vendor_completions.d"]
          system_command "/bin/bash", args: ["-c", "#{staged_path}/slv completion bash > #{HOMEBREW_PREFIX}/etc/bash_completion.d/slv"]
          system_command "/bin/bash", args: ["-c", "#{staged_path}/slv completion zsh > #{HOMEBREW_PREFIX}/share/zsh/site-functions/_slv"]
          system_command "/bin/bash", args: ["-c", "#{staged_path}/slv completion fish > #{HOMEBREW_PREFIX}/share/fish/vendor_completions.d/slv.fish"]
    commit_author:
      name: Shibly Meeran
      email: shibme@shib.me
    repository:
      owner: amagioss
      name: homebrew-slv
      branch: main
      git:
        url: 'git@github.com:amagioss/homebrew-slv.git'
        private_key: '{{ .Env.HOMEBREW_SSH_KEY }}'
